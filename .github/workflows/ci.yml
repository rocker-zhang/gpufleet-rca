name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2

  test:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race -count=1 ./...

  build:
    needs: [test]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: cross build static (CGO disabled)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /dev/null ./...

  # TODO(TASK-0054): add a `require-by-tag` job (like agent/cli/semantics have)
  # that resolves the proto gen module strictly by its pinned tag with no local
  # `replace`, exercising rca's RELEASE consumption path.
  #
  # OUT OF SCOPE TODAY — this is BLOCKED on publishing the open repos, which is
  # gate-⑥ / G8 work tracked under TASK-0036 (proto must publish the Go submodule
  # tag `gen/go/v0.1.0` and the private sibling repos need GOPRIVATE + token auth
  # before a by-tag resolve can actually run, even in SOFT mode). Once TASK-0036
  # lands, copy agent/.github/workflows/ci.yml's `require-by-tag` job + add
  # rca/ci/verify-by-tag.sh, gated SOFT by `vars.PROTO_GEN_TAG_PUBLISHED`.

  supply-chain:
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: govulncheck
        # TASK-0054: pin govulncheck (no `@latest`) so a CI run is reproducible
        # and a new tool release can't silently change the gate's behaviour.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
      - name: syft SBOM
        uses: anchore/sbom-action@v0.17.9
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TASK-0054: pin the ruleset to the repo config (default rules +
          # testdata/fixture allowlist) so secret scanning is deterministic.
          GITLEAKS_CONFIG: .gitleaks.toml
