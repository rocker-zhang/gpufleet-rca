name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          install-mode: goinstall
          version: v1.62.2

  test:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race -count=1 ./...

  build:
    needs: [test]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: cross build static (CGO disabled)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /dev/null ./...

  # `require-by-tag` proves the RELEASE consumption path: the tag, the `require`
  # version string, and the go.sum checksum for the gen module are never exercised
  # by a normal build (rca has no local replace today, but this job guards against
  # one creeping in and confirms the pinned tag resolves from the proxy).
  # This job drops every gpufleet-* replace and resolves the gen module strictly
  # by its pinned tag.
  #
  # PREREQUISITE (outside this repo — see TASK-0031): proto must publish the Go
  # submodule tag `gen/go/v0.3.0` (Go derives the tag from the module subdir
  # path; a module at .../gen/go is NOT addressable by `proto/v0.3.0`), and the
  # private repo must be auth'd via GOPRIVATE + a github.com token. Until then
  # the job runs in SOFT mode (prints the exact unresolved revision, exits 0).
  # Flip repo variable PROTO_GEN_TAG_PUBLISHED=true to make it blocking.
  require-by-tag:
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # The job runs a repo script after checkout; don't leave the GitHub
          # token in the local git config for it.
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: resolve gen module by pinned tag (no replace)
        env:
          VERIFY_BY_TAG_SOFT: ${{ vars.PROTO_GEN_TAG_PUBLISHED == 'true' && '0' || '1' }}
        run: bash ci/verify-by-tag.sh

  supply-chain:
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # This job runs third-party actions (syft, gitleaks) after checkout;
          # don't leave the GitHub token in the local git config for them.
          persist-credentials: false
          # gitleaks (below) scans the PR commit range `<sha>^..<sha>`, which
          # needs the parent commit; the default shallow clone omits it and the
          # scan fails with "unknown revision". Match secret-scan.yml's full
          # checkout so the range resolves.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: govulncheck
        # TASK-0054: pin govulncheck (no `@latest`) so a CI run is reproducible
        # and a new tool release can't silently change the gate's behaviour.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
      - name: syft SBOM
        uses: anchore/sbom-action@v0.17.9
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TASK-0054: pin the ruleset to the repo config (default rules +
          # testdata/fixture allowlist) so secret scanning is deterministic.
          GITLEAKS_CONFIG: .gitleaks.toml
